<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers - BrickSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">BrickSync</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="customers.html">Customers</a></li>
          <li class="nav-item"><a class="nav-link" href="sales.html">Sales</a></li>
          <li class="nav-item"><a class="nav-link" href="payments.html">Payments</a></li>
          <li class="nav-item"><a class="nav-link" href="transactions.html">Transactions</a></li>
          <li class="nav-item"><a class="nav-link" href="balances.html">Balances</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container mt-4">
    <h1>Customers</h1>
    <form id="customerForm" class="mb-4">
      <div class="row">
        <div class="col-md-4 mb-3">
          <input type="text" id="customerId" class="form-control" placeholder="Customer ID" required>
        </div>
        <div class="col-md-4 mb-3">
          <input type="text" id="customerName" class="form-control" placeholder="Customer Name" required>
        </div>
        <div class="col-md-4 mb-3">
          <button type="submit" class="btn btn-primary">Add Customer</button>
        </div>
      </div>
    </form>
    <h3>Customer List</h3>
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Customer ID</th>
          <th>Customer Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="customerList"></tbody>
    </table>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="scripts/main.js"></script>
</body>
</html>
