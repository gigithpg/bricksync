<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrickSync Dashboard</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/themify-icons@0.1.2/css/themify-icons.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="fixed-sidebar">
    <div class="sidebar-content">
      <div class="sidebar-brand">
        <a href="index.html">BrickSync</a>
        <div class="menu-toggle">
          <i class="fas fa-bars"></i>
        </div>
      </div>
      <ul class="sidebar-menu">
        <li class="active"><a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
        <li><a href="customers.html"><i class="fas fa-users"></i> Customers</a></li>
        <li><a href="sales.html"><i class="fas fa-shopping-cart"></i> Sales</a></li>
        <li><a href="payments.html"><i class="fas fa-money-bill"></i> Payments</a></li>
        <li><a href="transactions.html"><i class="fas fa-exchange-alt"></i> Transactions</a></li>
        <li><a href="balances.html"><i class="fas fa-balance-scale"></i> Balances</a></li>
      </ul>
    </div>
  </div>
  <div class="main-content">
    <header>
      <nav class="navbar navbar-top navbar-expand navbar-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="index.html">BrickSync</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="#" onclick="toggleTheme()">Toggle Theme</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <div class="container-fluid">
      <h1 class="mt-4">Dashboard</h1>
      <div class="row">
        <div class="col-xl-3 col-md-6">
          <div class="card bg-primary text-white mb-4">
            <div class="card-body">
              <div class="d-flex align-items-center">
                <i class="fas fa-users fa-2x me-3"></i>
                <div>
                  <h5>Total Customers</h5>
                  <p id="totalCustomers">Loading...</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-xl-3 col-md-6">
          <div class="card bg-success text-white mb-4">
            <div class="card-body">
              <div class="d-flex align-items-center">
                <i class="fas fa-shopping-cart fa-2x me-3"></i>
                <div>
                  <h5>Total Sales</h5>
                  <p>Coming soon...</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-xl-3 col-md-6">
          <div class="card bg-warning text-white mb-4">
            <div class="card-body">
              <div class="d-flex align-items-center">
                <i class="fas fa-balance-scale fa-2x me-3"></i>
                <div>
                  <h5>Pending Balances</h5>
                  <p>Coming soon...</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="card mb-4">
        <div class="card-header">
          <i class="fas fa-chart-area me-1"></i> Sales Overview
        </div>
        <div class="card-body">
          <canvas id="dashboardChart"></canvas>
        </div>
      </div>
    </div>
    <footer class="text-center py-3">Powered by <a href="https://colorlib.com">Colorlib</a></footer>
  </div>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="scripts/main.js"></script>
  <script src="scripts/dashboard.js"></script>
</body>
</html>
